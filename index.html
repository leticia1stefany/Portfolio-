<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>

    <title>Stefany Santos | Dev Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .purple-gradient-text {
            background: linear-gradient(135deg, #ffffff 30%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>

<header class="fixed top-0 w-full z-50 py-6 px-10 flex justify-between items-center bg-black/20 backdrop-blur-md">
    <div class="text-xl font-black tracking-widest">SS<span class="text-purple-500">.</span></div>
</header>

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center px-6 pt-20">
    <div class="text-center mb-10">
        <h1 class="text-6xl font-black">STEFANY</h1>
        <h2 class="text-5xl font-black purple-gradient-text">SANTOS</h2>
    </div>

    <div class="glass rounded-3xl p-8 text-center max-w-xl">
        <!-- IMPORTANTE: troque pela sua imagem -->
        <img src="sua-foto.jpg" class="w-40 h-40 rounded-full mx-auto mb-6 object-cover">

        <p class="text-gray-300">

        </p>

<!-- SKILLS -->

        <span class="glass px-4 py-2 rounded-full">Spring Boot</span>
        <span class="glass px-4 py-2 rounded-full">SQL</span>
        <span class="glass px-4 py-2 rounded-full">HTML/CSS</span>
        <span class="glass px-4 py-2 rounded-full">JavaScript</span>
    </div>
</section>

<!-- PROJETOS -->
<section class="py-20 text-center">
    <h3 class="text-3xl font-bold mb-10">Projetos</h3>

    <div class="max-w-xl mx-auto glass p-6 rounded-2xl">
        <h4 class="text-xl font-bold">Agenda de Eventos</h4>
        <p class="text-gray-400">Sistema para gerenciamento de eventos</p>

<!-- CONTATO -->
<section class="py-20 text-center">
    <h3 class="text-3xl font-bold mb-6">Contato</h3>

<footer class="text-center py-6 text-gray-500">

</footer>

</html>
