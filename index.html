<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefany Santos | Portfólio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-dark: #0a0a0a; --accent: #3b82f6; }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* ESTILO DO MENU OVERLAY */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-content a {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            display: block;
            line-height: 1.1;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            transition: 0.4s;
            position: relative;
        }

        .menu-content a:hover {
            color: white;
            -webkit-text-stroke: 1px white;
            transform: skewX(-10deg);
        }

        /* Imagem que aparece no fundo ao passar o mouse (Efeito Rhuan Bello) */
        .menu-bg-img {
            position: absolute;
            width: 400px;
            height: 500px;
            background-size: cover;
            background-position: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: -1;
            border-radius: 10px;
            filter: grayscale(100%);
        }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; }
        .hero h1 { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; letter-spacing: -2px; }
    </style>
</head>
<body>

<header class="fixed top-0 w-full z-[100] py-8 px-10 flex justify-between items-center mix-blend-difference">
    <div class="text-xl font-black uppercase tracking-tighter">Portfolio<span class="text-blue-500">.</span></div>
    
    <button onclick="toggleMenu()" class="group flex items-center gap-3 text-[10px] uppercase tracking-[0.3em] font-bold">
        <span id="menu-text">Menu</span>
        <div class="flex flex-col gap-1">
            <div class="w-6 h-[1px] bg-white group-hover:w-8 transition-all"></div>
            <div class="w-6 h-[1px] bg-white group-hover:w-4 transition-all"></div>
        </div>
    </button>
</header>

<div id="menuOverlay" class="menu-overlay">
    <div id="hoverImg" class="menu-bg-img"></div>
    
    <div class="menu-content text-center">
        <a href="#inicio" onmouseover="showImg('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80')" onmouseout="hideImg()" onclick="toggleMenu()">Início</a>
        <a href="#projetos" onmouseover="showImg('https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80')" onmouseout="hideImg()" onclick="toggleMenu()">Projetos</a>
        <a href="#contato" onmouseover="showImg('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=800&q=80')" onmouseout="hideImg()" onclick="toggleMenu()">Contato</a>
    </div>
</div>

<main>
    <section id="inicio" class="hero">
        <span class="text-blue-500 font-bold uppercase text-xs tracking-widest mb-4">Software Engineer</span>
        <h1>STEFANY<br>SANTOS<span class="text-blue-500">.</span></h1>
        <p class="text-zinc-500 max-w-lg mt-6 text-lg">Criando soluções de alta performance com Java e tecnologias modernas de análise de dados.</p>
    </section>

    <section id="projetos" class="py-20 px-10 min-h-screen">
        <h2 class="text-4xl font-black mb-10 uppercase tracking-tighter">Trabalhos</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="h-[400px] bg-zinc-900 border border-white/5 rounded-lg"></div>
            <div class="h-[400px] bg-zinc-900 border border-white/5 rounded-lg"></div>
        </div>
    </section>
</main>

<script>
    const overlay = document.getElementById('menuOverlay');
    const hoverImg = document.getElementById('hoverImg');
    const menuText = document.getElementById('menu-text');

    // Função para abrir/fechar o menu
    function toggleMenu() {
        overlay.classList.toggle('active');
        const isOpen = overlay.classList.contains('active');
        menuText.innerText = isOpen ? "Fechar" : "Menu";
        document.body.style.overflow = isOpen ? "hidden" : "auto";
    }

    // Efeito de imagem ao passar o mouse
    function showImg(url) {
        hoverImg.style.backgroundImage = `url('${url}')`;
        hoverImg.style.opacity = "0.2";
        
        // Segue o mouse opcionalmente
        document.addEventListener('mousemove', moveImage);
    }

    function hideImg() {
        hoverImg.style.opacity = "0";
        document.removeEventListener('mousemove', moveImage);
    }

    function moveImage(e) {
        hoverImg.style.left = e.clientX - 200 + 'px';
        hoverImg.style.top = e.clientY - 250 + 'px';
    }
</script>

</body>
</html>
